<svg width="420" height="100" viewBox="0 0 420 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="infinitechGradient" x1="10" y1="10" x2="390" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Futuristic I Symbol -->
  <g filter="url(#glow)">
    <!-- Main vertical circuit -->
    <path
      d="M28 20V80"
      stroke="url(#infinitechGradient)"
      stroke-width="7"
      stroke-linecap="round"
    />

    <!-- Top circuit -->
    <path
      d="M28 20H48"
      stroke="url(#infinitechGradient)"
      stroke-width="5"
      stroke-linecap="round"
    />

    <!-- Bottom circuit -->
    <path
      d="M28 80H48"
      stroke="url(#infinitechGradient)"
      stroke-width="5"
      stroke-linecap="round"
    />

    <!-- Circuit branches -->
    <path
      d="M48 20V12H62"
      stroke="#22D3EE"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M48 80V88H62"
      stroke="#3B82F6"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Circuit nodes -->
    <circle cx="64" cy="12" r="5" fill="#22D3EE"/>
    <circle cx="64" cy="88" r="5" fill="#3B82F6"/>
    <circle cx="28" cy="20" r="4" fill="#22D3EE"/>
    <circle cx="28" cy="80" r="4" fill="#3B82F6"/>
  </g>

  <!-- INFINITECH Wordmark -->
  <text
    x="88"
    y="64"
    fill="white"
    font-family="Arial, Helvetica, sans-serif"
    font-size="38"
    font-weight="700"
    letter-spacing="2"
  >
    INFINITECH
  </text>

  <!-- Technology tagline -->
  <text
    x="91"
    y="84"
    fill="#22D3EE"
    font-family="Arial, Helvetica, sans-serif"
    font-size="9"
    font-weight="500"
    letter-spacing="4"
  >
    ENGINEERING • TECHNOLOGY • INNOVATION
  </text>
</svg>
